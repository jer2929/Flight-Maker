# Continuous deploy: every push to main builds and ships to Fly.io.
# Merging a PR into main = deploying. No manual step.
#
# Requires one repo secret: FLY_API_TOKEN
#   Settings → Secrets and variables → Actions → New repository secret
#   Value from:  fly tokens create deploy -x 999999h   (see DEPLOY.md)
name: Deploy to Fly.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group   # never run two deploys at once
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
