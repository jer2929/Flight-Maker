# Personal Flight Decision Card — encoded limits (Jeremy / CYFD)
# Edit these to tune the tool. All winds in knots, visibility in statute miles,
# ceilings in feet AGL. Cross-country (XC) values are used for destination flights.

hard_limits:
  wind:
    sustained_max_kt: 20
    gust_spread_max_kt: 10      # gust minus steady
    crosswind_max_kt: 9
  ceiling_agl_ft:               # VFR personal minimums
    day_circuit: 2000
    day_xc: 4000
    night_circuit: 3000
    night_xc_cloud_base: 12000
  visibility_sm:                # VFR personal minimums
    day_circuit: 5
    day_xc: 9
    night_circuit: 6
    night_xc: 9
  weather_flags:                # any present in METAR/TAF -> NO-GO
    - convective_sigmet
    - thunderstorm            # TS
    - embedded_thunderstorm   # embedded TS
    - freezing_rain           # FZRA
    - forecast_icing
    - moderate_turbulence_low # below 3000 ft
    - low_level_wind_shear    # LLWS / WS
    - widespread_ifr
  recent_experience:
    min_hours_last_30_days: 5
  fuel_reserve_hr:
    vfr: 1.0
    ifr: 1.5

# IFR personal minimums — used when flight_rules=ifr is selected.
# These are separate from hard_limits so VFR profile sliders are unaffected.
ifr_minimums:
  ceiling_agl_ft:
    day_xc: 1500         # flat personal ceiling floor (confirm it's >= published DA/MDA)
    night_xc: 1500
  visibility_sm:
    day_xc: 3            # flat personal visibility floor (confirm it meets published minimum)
    night_xc: 3

# TWO-TRIGGER THREAT STACKING
# A weighted count of major threats present -> rule. The active conservatism
# preset (below) supplies both the per-threat weights and this rule; the values
# here are the built-in default ("standard").
threat_stacking:
  major_threats:
    - night_operations
    - actual_imc
    - icing_potential
    - convective_nearby
    - strong_or_gusty_winds
    - moderate_turbulence_or_shear
    - terrain_critical
    - single_pilot_ifr_no_autopilot
    - unfamiliar_or_complex_airspace
  rule:
    "0": GO
    "1": MITIGATE
    "2": NO-GO        # no-go solo
    "3": NO-GO
  # How each threat is sourced, for the UI:
  #   auto       — derived automatically from the forecast each hour
  #   mode       — set automatically by the day/night toggle
  #   standing   — a pilot/aircraft factor saved in the profile, applied every flight
  #   per_flight — toggled per flight (pilot-relative)
  threat_kinds:
    night_operations: mode
    actual_imc: auto
    icing_potential: auto
    convective_nearby: auto
    strong_or_gusty_winds: auto
    moderate_turbulence_or_shear: auto
    terrain_critical: per_flight
    single_pilot_ifr_no_autopilot: per_flight
    unfamiliar_or_complex_airspace: per_flight

# CONSERVATISM PRESETS — how readily stacked threats escalate the verdict.
# Each preset supplies per-threat `weights` (default 1) and the count->verdict
# `rule`. The pilot picks one in their profile; "standard" preserves the
# original decision card and is the default.
conservatism_presets:
  default: standard
  presets:
    cautious:
      label: Cautious
      description: A single serious weather threat is disqualifying.
      serious_weight: 2          # actual_imc / convective / icing count double
      rule: {"0": GO, "1": MITIGATE, "2": NO-GO, "3": NO-GO}
    standard:
      label: Standard
      description: One threat → mitigate, two → no-go (the original card).
      rule: {"0": GO, "1": MITIGATE, "2": NO-GO, "3": NO-GO}
    confident:
      label: Confident
      description: Tolerates one threat; two → mitigate, three → no-go.
      rule: {"0": GO, "1": GO, "2": MITIGATE, "3": NO-GO}
  # Threats treated as "serious" (double-weighted under the cautious preset).
  serious_threats:
    - actual_imc
    - convective_nearby
    - icing_potential


# Thresholds used to derive threats/scoring from forecast model data (outlook)
outlook:
  good_max_wind_kt: 12
  marginal_max_wind_kt: 18
  good_max_crosswind_kt: 7
  good_max_cloud_pct: 50
  good_max_precip_mm: 0.2
  marginal_max_precip_mm: 2.0
  cape_convective: 300        # J/kg suggesting convective potential
  pressure_falling_hpa_per_6h: -1.5   # steeper fall than this = low approaching
  pressure_rising_hpa_per_6h: 1.0     # rise above this = high building
